services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: oniec
      POSTGRES_PASSWORD: oniec
      POSTGRES_DB: oniec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://oniec:oniec@db:5432/oniec
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
